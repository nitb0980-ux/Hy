name: Minecraft Server Auto-Setup

on:
  workflow_dispatch: # Isse aap manually 'Run workflow' button daba kar start karein

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Minecraft 1.18+ ke liye 17, naye versions ke liye 21 karein

      # Hum manually jar file upload nahi karenge, yahan automatic download karenge.
      # Ye command PaperMC ki latest release download karegi.
      - name: Download PaperMC server.jar
        run: |
          echo "eula=true" > eula.txt # Automatic EULA accept
          curl -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/497/downloads/paper-1.20.4-497.jar
          # Dhyaan dein: Upar wale URL mein aap '1.20.4' aur build number change kar sakte hain.

      # Playit.gg Setup (Secret key wahi hai jo aapke pehle screenshot mein thi)
      - name: Setup Playit.gg
        run: |
          curl -Lo playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          ./playit --secret 75aea16a41af9c64e0ee3ab1effa0c89df76c4fc804e9d1bcbaa343ce5c4bd1c run &
          sleep 10

      - name: Start Minecraft Server
        run: |
          java -Xmx7G -Xms7G -jar server.jar nogui # GitHub Runners mein 7GB RAM mil jaati hai
