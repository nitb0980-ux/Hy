name: Minecraft Server with Auto-Save

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history ke liye

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Previous World & Plugins
        run: |
          # Agar pehle se backup hai toh use extract karein
          if [ -f "server_backup.zip" ]; then
            unzip -o server_backup.zip
            echo "Previous backup restored!"
          fi

      - name: Download Server & Playit
        run: |
          # Server jar download (agar pehle se nahi hai)
          if [ ! -f "server.jar" ]; then
            curl -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/497/downloads/paper-1.20.4-497.jar
          fi
          echo "eula=true" > eula.txt
          
          # Playit Stable
          curl -Lo playit https://github.com/playit-cloud/playit-agent/releases/download/v0.15.13/playit-linux-amd64
          chmod +x playit

      - name: Run Playit & Server
        run: |
          ./playit --secret e58dd831126be724b46bc310df370deee0c517a18a49364837e8e51e5d24de53 run &
          sleep 15
          java -Xmx7G -Xms7G -jar server.jar nogui

      - name: Auto-Save Progress to Repo
        if: always() # Server band hone par ye hamesha chalega
        run: |
          # Sab kuch zip karein (World, Plugins, Configs)
          zip -r server_backup.zip world/ world_nether/ world_the_end/ plugins/ server.properties ops.json whitelist.json
          
          # Git settings setup karein
          git config --global user.name "BlazeSlayer-Bot"
          git config --global user.email "bot@github.com"
          
          # Repository mein upload karein
          git add server_backup.zip
          git commit -m "Auto-Save: Server progress at $(date)"
          git push
          
