name: Minecraft Server Auto-Setup

on:
  workflow_dispatch: # Isse aap manually 'Run workflow' button daba kar start kar sakte hain

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Minecraft 1.18+ ke liye 17 best hai

      - name: Download PaperMC server.jar
        run: |
          echo "eula=true" > eula.txt # Automatic EULA accept karega
          # Yeh command latest PaperMC 1.20.4 download karegi
          curl -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/497/downloads/paper-1.20.4-497.jar

      - name: Setup Playit.gg
        run: |
          curl -Lo playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          # Fixed command: 'run' keyword hata diya hai naye version ke liye
          ./playit --secret 75aea16a41af9c64e0ee3ab1effa0c89df76c4fc804e9d1bcbaa343ce5c4bd1c &
          sleep 15 # Wait karega connection establish hone tak

      - name: Start Minecraft Server
        run: |
          # 7GB RAM ke saath server start hoga
          java -Xmx7G -Xms7G -jar server.jar nogui
          
